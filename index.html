<!DOCTYPE html>
<html lang="gu">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>शिक्षापत्री - Shikshapatri</title>
    <meta name="description"
        content="Read Shikshapatri slokas with Sanskrit, Gujarati and English translations. A sacred text by Lord Swaminarayan.">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/styles.css">
    <meta name="theme-color" content="#E6A623">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="icon" href="assets/images/favicon.ico">
    <link rel="apple-touch-icon" href="assets/images/icon-192.png">
</head>

<body>
    <!-- Skip link for accessibility -->
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <header id="header" role="banner">
        <button id="back-btn" style="display:none;" aria-label="Go back to slokas list">
            <i class="fas fa-arrow-left" aria-hidden="true"></i>
        </button>
        <h1 id="header-title"><img src="assets/images/navbar-image.png" alt="शिक्षाપત્રી" id="header-logo"></h1>
        <button id="bookmark-btn" style="display:none;" aria-label="Bookmark this sloka" aria-pressed="false">
            <i class="fas fa-bookmark" aria-hidden="true"></i>
            <span id="bookmark-bubble" class="bookmark-bubble" aria-hidden="true"></span>
        </button>
    </header>

    <main id="main-content" role="main">
        <div id="list-screen" class="screen active" aria-label="List of all slokas">
            <div class="hero-video-container">
                <iframe src="https://www.youtube.com/embed/gDTZOd1ShZM" title="Shikshapatri Video" frameborder="0"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                    allowfullscreen></iframe>
            </div>
            <div id="slokas-list" role="list" aria-label="Shikshapatri slokas"></div>
        </div>
        <div id="detail-screen" class="screen" aria-label="Sloka detail view">
            <article id="sloka-content">
                <img id="sloka-image" src="" alt="Sloka illustration" loading="lazy">
                <div id="sloka-sanskrit" aria-label="Sanskrit text"></div>
                <div id="translation-card">
                    <div class="translation-header">
                        <span class="translation-title"><i class="fas fa-language"></i> Translation</span>
                        <select id="language-select" class="language-select" aria-label="Select language">
                            <option value="gujarati">ગુજરાતી</option>
                            <option value="hindi">हिन्दी</option>
                            <option value="english">English</option>
                        </select>
                    </div>
                    <div id="sloka-text" aria-label="Translation"></div>
                </div>
                <div id="sloka-translation" aria-label="Additional translation"></div>
            </article>
        </div>
    </main>

    <div id="bottom-bar-container">
        <nav id="sloka-navigation" aria-label="Sloka navigation" style="display: none;">
            <button id="prev-sloka-btn" aria-label="Previous sloka">
                <i class="fas fa-chevron-left" aria-hidden="true"></i>
            </button>
            <div id="sloka-slider-container">
                <input type="range" id="sloka-slider" min="1" max="212" value="1" aria-label="Sloka number"
                    aria-valuemin="1" aria-valuemax="212" aria-valuenow="1" aria-valuetext="Sloka 1 of 212">
                <div id="sloka-counter" aria-live="polite">1/212</div>
            </div>
            <button id="next-sloka-btn" aria-label="Next sloka">
                <i class="fas fa-chevron-right" aria-hidden="true"></i>
            </button>
        </nav>
        <footer id="app-footer" role="contentinfo">
            <p><strong>✍️ by</strong> Lord Swaminarayan
                <strong>on</strong> February 11, 1826 🙏
            </p>
        </footer>
    </div>



    <script src="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/js/all.min.js" defer></script>
    <script src="js/app.js" defer></script>
</body>

</html>
